<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 420px; margin: 4rem auto; }
    form { display: grid; gap: 10px; }
    input, button { padding: 10px; font-size: 16px; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 12px; }
    .row { display: grid; gap: 6px; }
    .msg { margin-top: 10px; }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <form id="loginForm">
      <div class="row">
        <label>Username</label>
        <input name="username" required />
      </div>
      <div class="row">
        <label>Password</label>
        <input name="password" type="password" required />
      </div>
      <button type="submit">Log in</button>
    </form>
    <div class="msg" id="msg"></div>
    <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      msg.textContent = "Logging in...";
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Login failed');
        msg.textContent = 'Logged in as ' + json.user.username;
        setTimeout(() => window.location.href = '/', 600);
      } catch (err) {
        msg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
